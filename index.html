<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>L'écho d'aujourd'hui</title>

<link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@300;400;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>

<style>
:root{
--bleu:#0b1f3a;
--rouge:#c8102e;
--fond:#ffffff;
--gris:#f2f2f2;
}

body{margin:0;font-family:'Merriweather',serif;background:var(--fond);color:#111}

/* HEADER STYLE FIGARO */
header{
border-bottom:1px solid #ddd;
padding:10px 0;
text-align:center;
}

.logo{
font-size:36px;
font-weight:bold;
letter-spacing:2px;
color:var(--bleu);
}

.nav{
display:flex;justify-content:center;gap:20px;
padding:10px;border-bottom:1px solid #ddd;
font-family:'Inter',sans-serif;
font-size:14px;
}

.nav span{cursor:pointer}

.container{
max-width:1100px;margin:auto;padding:20px;
}

/* UNE */
.une{
display:grid;
grid-template-columns:2fr 1fr;
gap:20px;
margin-bottom:30px;
}

.main-article img{
width:100%;height:350px;object-fit:cover;
}

.main-article h1{
font-size:32px;margin:10px 0;
}

.side-article{
border-top:1px solid #ddd;padding-top:10px;
}

.side-article h3{
font-size:16px;margin:5px 0;
}

/* LISTE */
.article-list{
border-top:2px solid var(--bleu);
padding-top:20px;
}

.article{
padding:15px 0;border-bottom:1px solid #ddd;
}

.article h2{font-size:20px;margin:0 0 5px}

.meta{font-size:12px;color:#666}

/* EDITOR */
.editor-btn{
position:fixed;bottom:20px;right:20px;
background:var(--rouge);color:white;border:none;
padding:15px;border-radius:50%;font-size:20px;
cursor:pointer;
}

.modal{position:fixed;top:0;left:0;width:100%;height:100%;
background:rgba(0,0,0,0.7);display:none;justify-content:center;align-items:center}

.modal.active{display:flex}

.editor{background:white;padding:25px;border-radius:10px;width:90%;max-width:600px}

input,textarea{width:100%;padding:10px;margin-bottom:10px;border:1px solid #ccc}

@media(max-width:800px){
.une{grid-template-columns:1fr}
}
</style>
</head>

<body>

<header>
<div class="logo">L'ÉCHO</div>
</header>

<div class="nav">
<span>Actualités</span>
<span>Politique</span>
<span>Économie</span>
<span>Culture</span>
<span>Sport</span>
</div>

<div class="container">
<div class="une" id="une"></div>
<div class="article-list" id="articles"></div>
</div>

<button class="editor-btn" onclick="openEditor()">✍️</button>

<div class="modal" id="modal">
<div class="editor">
<h2>Nouvel article</h2>
<input id="title" placeholder="Titre">
<textarea id="content"></textarea>
<button onclick="saveArticle()">Publier</button>
</div>
</div>

<script>
const firebaseConfig={apiKey:"YOUR_KEY",authDomain:"YOUR_DOMAIN",projectId:"YOUR_PROJECT"};
const app=firebase.initializeApp(firebaseConfig);
const db=firebase.firestore();

function openEditor(){modal.classList.add('active')}

async function saveArticle(){
await db.collection('articles').add({title:title.value,content:content.value,date:new Date().toLocaleString()});
modal.classList.remove('active');title.value='';content.value='';}

function load(){
let first=true;
db.collection('articles').orderBy('date','desc').onSnapshot(s=>{
une.innerHTML='';articles.innerHTML='';
let sideHTML='';

s.forEach((doc,i)=>{
let a=doc.data();

if(i===0){
une.innerHTML=`
<div class="main-article">
<img src="https://picsum.photos/800/400">
<h1>${a.title}</h1>
<p>${a.content}</p>
</div>
<div>${sideHTML}</div>`;
}else if(i<4){
sideHTML+=`<div class="side-article"><h3>${a.title}</h3></div>`;
}else{
let el=document.createElement('div');
el.className='article';
el.innerHTML=`<h2>${a.title}</h2><div class="meta">${a.date}</div>`;
articles.appendChild(el);
}
});
});}

window.onload=load;
</script>

</body>
</html>

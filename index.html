```html
<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>L'ÉCHO D'AUJOURD'HUI</title>

<link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@300;400;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<style>
:root{--bleu:#0b1f3a;--vert:#2e7d32;--fond:#f5f7fa}
body{margin:0;font-family:'Merriweather',serif;background:var(--fond)}
header{text-align:center;padding:20px;background:white;border-radius:0 0 20px 20px}
.logo{font-size:34px;font-weight:bold;color:var(--bleu)}

.topbar{display:flex;justify-content:space-between;align-items:center;padding:10px 20px;background:white;flex-wrap:wrap}
.topbar input{padding:8px;border-radius:10px;border:1px solid #ccc;width:200px}
.topbar button{padding:8px;border:none;border-radius:10px;background:var(--bleu);color:white;cursor:pointer}

.nav{display:flex;justify-content:center;gap:20px;padding:10px;background:white;border-bottom:1px solid #ddd;flex-wrap:wrap}
.nav a{cursor:pointer;font-weight:600;color:var(--bleu)}

.container{max-width:800px;margin:auto;padding:20px}
.article{background:white;padding:20px;border-radius:20px;margin-bottom:30px;box-shadow:0 5px 15px rgba(0,0,0,0.05)}
.article img{width:100%;border-radius:15px;margin-top:10px}
.meta{color:#666;font-size:12px;margin-bottom:10px}
.content{font-size:18px;line-height:1.6}

.editor-btn{position:fixed;bottom:20px;right:20px;background:var(--bleu);color:white;border:none;padding:15px;border-radius:50%;display:none;cursor:pointer}

.modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.6);display:none;justify-content:center;align-items:center}
.modal.active{display:flex}
.editor{background:white;padding:20px;border-radius:20px;width:90%;max-width:600px}
input,textarea{width:100%;padding:10px;margin-bottom:10px;border-radius:10px;border:1px solid #ccc}
</style>
</head>

<body>

<header>
<div class="logo">L'ÉCHO D'AUJOURD'HUI</div>
</header>

<div class="topbar">
<input type="text" id="search" placeholder="Rechercher..." oninput="searchArticles()">
<div>
<button onclick="login()">Connexion</button>
<button onclick="logout()">Déconnexion</button>
</div>
</div>

<div class="nav">
<a onclick="filter('all')">Actualités</a>
<a onclick="filter('politique')">Politique</a>
<a onclick="filter('eco')">Économie</a>
<a onclick="filter('culture')">Culture</a>
<a onclick="filter('sport')">Sport</a>
</div>

<div class="container" id="articles">Chargement...</div>

<button class="editor-btn" id="editBtn" onclick="openEditor()">✍️</button>

<div class="modal" id="modal">
<div class="editor">
<h2>Nouvel article</h2>
<input id="title" placeholder="Titre">
<input id="image" placeholder="URL image">
<input id="category" placeholder="Catégorie">
<textarea id="content" placeholder="Contenu"></textarea>
<button onclick="saveArticle()">Publier</button>
<button onclick="closeEditor()">Fermer</button>
</div>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyA3A7zebX0HSQEpKTYOXNGBid1SiaRiBEI",
  authDomain: "echo-aujourdhui.firebaseapp.com",
  projectId: "echo-aujourdhui",
  storageBucket: "echo-aujourdhui.firebasestorage.app",
  messagingSenderId: "806817807595",
  appId: "1:806817807595:web:7a678d6bec26c718ba92ae",
  measurementId: "G-CLSH7LPH1F"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const auth = firebase.auth();

const ADMIN_EMAIL = "hugoropars05@outlook.fr";

const modal = document.getElementById('modal');
const articlesDiv = document.getElementById('articles');
const editBtn = document.getElementById('editBtn');

let allArticles = [];

function login(){
const email = prompt("Email");
const password = prompt("Mot de passe");

auth.signInWithEmailAndPassword(email,password)
.then(()=>alert("Connecté"))
.catch(()=>alert("Erreur de connexion"));
}

function logout(){
auth.signOut();
}

function openEditor(){
if(auth.currentUser && auth.currentUser.email === ADMIN_EMAIL){
modal.classList.add('active');
}
}

function closeEditor(){
modal.classList.remove('active');
}

function escapeHTML(text){
return text.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

function formatText(text){
text = escapeHTML(text);
return text.replace(/\n/g,'<br>');
}

async function saveArticle(){
if(!auth.currentUser || auth.currentUser.email !== ADMIN_EMAIL){
alert("Non autorisé");
return;
}

await db.collection('articles').add({
title: document.getElementById('title').value,
content: document.getElementById('content').value,
image: document.getElementById('image').value,
category: document.getElementById('category').value.toLowerCase(),
date: new Date()
});

closeEditor();
}

function display(list){
articlesDiv.innerHTML='';

if(list.length === 0){
articlesDiv.innerHTML = "<p>Aucun article</p>";
return;
}

list.forEach(a=>{
let div=document.createElement('div');
div.className='article';

let date = a.date?.toDate ? a.date.toDate().toLocaleString() : '';

div.innerHTML = `
<h2>${a.title}</h2>
<div class="meta">${date}</div>
${a.image ? `<img src="${a.image}">` : ''}
<div class="content">${formatText(a.content)}</div>
`;

articlesDiv.appendChild(div);
});
}

function filter(cat){
if(cat === 'all') display(allArticles);
else display(allArticles.filter(a=>a.category === cat));
}

function searchArticles(){
let q = document.getElementById('search').value.toLowerCase();

let filtered = allArticles.filter(a =>
a.title.toLowerCase().includes(q) ||
a.content.toLowerCase().includes(q)
);

display(filtered);
}

function load(){
db.collection('articles').orderBy('date','desc')
.onSnapshot(snapshot=>{
allArticles = [];
snapshot.forEach(doc=>{
allArticles.push({id: doc.id, ...doc.data()});
});
display(allArticles);
});
}

auth.onAuthStateChanged(user=>{
if(user && user.email === ADMIN_EMAIL){
editBtn.style.display = 'block';
}else{
editBtn.style.display = 'none';
}
});

window.onload = load;
</script>

</body>
</html>

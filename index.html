<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>L'Écho</title>

<link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@300;400;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<style>
:root{--bleu:#0b1f3a;--rouge:#c8102e}
body{margin:0;font-family:'Merriweather',serif;background:white;color:#111}
header{text-align:center;padding:20px;border-bottom:1px solid #ddd}
.logo{font-size:32px;font-weight:bold;color:var(--bleu)}
.container{max-width:800px;margin:auto;padding:20px}
.article{margin-bottom:40px}
.article img{width:100%;border-radius:10px;margin:15px 0}
.article h1{font-size:30px}
.meta{color:#666;font-size:12px;margin-bottom:15px}
.content{font-size:18px;line-height:1.8}
.editor-btn{position:fixed;bottom:20px;right:20px;background:var(--rouge);color:white;border:none;padding:15px;border-radius:50%;cursor:pointer;display:none}
.modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.6);display:none;justify-content:center;align-items:center}
.modal.active{display:flex}
.editor{background:white;padding:20px;border-radius:10px;width:90%;max-width:600px}
input,textarea{width:100%;padding:10px;margin-bottom:10px}
</style>
</head>

<body>
<header>
<div class="logo">L'ÉCHO</div>
</header>

<div class="container" id="articles"></div>

<button class="editor-btn" id="editBtn" onclick="openEditor()">✍️</button>

<div class="modal" id="modal">
<div class="editor">
<h2>Nouvel article</h2>
<input id="title" placeholder="Titre">
<input id="image" placeholder="URL image">
<textarea id="content" placeholder="Contenu"></textarea>
<button onclick="saveArticle()">Publier</button>
<button onclick="closeEditor()">Fermer</button>
</div>
</div>

<script>
// CONFIG FIREBASE
const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_DOMAIN",
  projectId: "YOUR_PROJECT"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const auth = firebase.auth();

// LOGIN SIMPLE (email admin)
const ADMIN_EMAIL = "admin@email.com";

function openEditor(){
  if(auth.currentUser && auth.currentUser.email === ADMIN_EMAIL){
    modal.classList.add('active');
  } else {
    const email = prompt("Email admin");
    const password = prompt("Mot de passe");

    auth.signInWithEmailAndPassword(email, password)
    .then(()=>{
      editBtn.style.display = 'block';
      alert("Connecté");
    })
    .catch(()=>alert("Erreur login"));
  }
}

function closeEditor(){
  modal.classList.remove('active');
}

function formatText(text){
  let html = text
  .replace(/\*\*(.*?)\*\*/g,'<b>$1</b>')
  .replace(/\*(.*?)\*/g,'<i>$1</i>')
  .replace(/## (.*?)\n/g,'<h2>$1</h2>');
  return html.split('\n\n').map(p=>`<p>${p}</p>`).join('');
}

async function saveArticle(){
  if(!auth.currentUser) return;

  await db.collection('articles').add({
    title: document.getElementById('title').value,
    content: document.getElementById('content').value,
    image: document.getElementById('image').value,
    date: new Date()
  });

  closeEditor();
}

function load(){
  db.collection('articles').orderBy('date','desc').onSnapshot(s=>{
    articles.innerHTML='';

    if(s.empty){
      articles.innerHTML = "<p>Aucun article pour le moment.</p>";
      return;
    }

    s.forEach(doc=>{
      let a = doc.data();
      let div = document.createElement('div');
      div.className='article';

      let date = a.date?.toDate ? a.date.toDate().toLocaleString() : '';

      div.innerHTML=`
        <h1>${a.title}</h1>
        <div class="meta">${date}</div>
        ${a.image ? `<img src="${a.image}">` : ''}
        <div class="content">${formatText(a.content)}</div>
      `;

      articles.appendChild(div);
    });
  });
}

auth.onAuthStateChanged(user=>{
  if(user && user.email === ADMIN_EMAIL){
    editBtn.style.display = 'block';
  }
});

window.onload = load;
</script>

</body>
</html>
